<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saikat | Freelancer & Web Designer</title>
    <meta name="description" content="Portfolio of Saikat, a 19-year-old Freelancer & Web Designer.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Using a condensed, bold font for the main headline to match "LOST IN THE BEAT" -->
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="noise-overlay"></div>
    <div class="tech-grid"></div>

    <header>
        <nav class="navbar">
            <div class="logo">
                <svg width="30" height="30" viewBox="0 0 24 24" fill="var(--accent-green)" xmlns="http://www.w3.org/2000/svg">
                    <!-- Spotify-ish inspired abstract logo (sound waves) -->
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 14.3c-.2.32-.6.43-.92.23-2.5-1.53-5.65-1.88-9.35-1.03-.36.08-.72-.15-.8-.52-.08-.36.15-.72.52-.8 4.05-.9 7.55-.5 10.33 1.2.32.2.43.62.22.92zm1.32-2.95c-.25.4-.76.54-1.16.28-2.86-1.75-7.23-2.3-10.4-1.26-.45.14-.93-.1-1.07-.55-.14-.45.1-.93.55-1.07 3.65-1.18 8.48-.56 11.8 1.48.4.25.54.76.28 1.16zm.13-3.08c-3.4-2.02-9-2.2-12.24-1.22-.53.16-1.1-.14-1.26-.67-.16-.53.14-1.1.67-1.26 3.75-1.13 10-.9 13.9 1.42.48.28.63.9.35 1.38-.28.48-.9.63-1.38.35z"/>
                </svg>
            </div>
            <ul class="nav-links">
                <li><a href="https://www.linkedin.com/in/saikat-mondal-1a713640a/" target="_blank">LinkedIn</a></li>
                <li><a href="https://www.facebook.com/profile.php?id=100049928273100" target="_blank">Facebook</a></li>
                <li><a href="https://www.instagram.com/saikatxcore/?__pwa=1" target="_blank">Instagram</a></li>
            </ul>
            <a href="#" class="btn-book">SOUND IS MY ESCAPE.</a>
        </nav>
    </header>

    <main class="hero">
        <div class="photo-section">
            <div class="glow-effect"></div>
            <div class="photo-card" id="photoCard">
                <div class="photo-placeholder">
                    <!-- The user's photo -->
                    <img src="saikat-photo.jpg" alt="Saikat" class="profile-image" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'100%\' height=\'100%\' viewBox=\'0 0 100 100\'><rect width=\'100%\' height=\'100%\' fill=\'%23111\'/><text x=\'50%\' y=\'50%\' fill=\'%239af01e\' font-family=\'sans-serif\' font-size=\'10\' text-anchor=\'middle\'>saikat-photo.jpg</text></svg>'">
                </div>
                <div class="info-overlay">
                    <h1 class="name">SAIKAT</h1>
                    <p class="profession">Freelancer & Web Designer</p>
                </div>
                
                <!-- Tech decorative elements on card -->
                <div class="card-deco deco-top-left"></div>
                <div class="card-deco deco-bottom-right"></div>
            </div>
        </div>

        <div class="text-section">
            <h2 class="main-headline">
                <span class="highlight">CRAFTING</span> INTUITIVE<br>USER EXPERIENCES<br><span class="highlight">FROM CONCEPT</span><br>TO INTERFACE
            </h2>
            
            <p class="about-me">
                <span class="tech-text">AGE 19 //</span> I LOVE LEARNING ALL KINDS OF STUFFS. <br>
                <span class="tech-text">FIND YOUR FREQUENCY. LIVE THE BEAT.</span>
            </p>

            <a href="#" class="btn-primary">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                PLAY NOW 
            </a>
        </div>
    </main>

    <!-- Audio Player Decorative Element at bottom -->
    <div class="audio-player-deco">
        <span class="time">1:27</span>
        <div class="progress-bar">
            <div class="progress-fill"></div>
            <div class="progress-thumb"></div>
        </div>
        <span class="time">3:47</span>
    </div>
</body>
</html>
